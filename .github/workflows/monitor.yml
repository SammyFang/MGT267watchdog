name: Supply Chain Watchdog

on:
  schedule:
    # Edit this cron to change the GitHub-hosted crawl interval.
    - cron: "0 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/monitor.yml"
      - "src/monitor.js"
      - "monitor_config.json"
      - "package.json"
      - "package-lock.json"

permissions:
  contents: read

jobs:
  monitor:
    if: github.event_name != 'push' || contains(github.event.head_commit.message, '[hourly-now]')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore monitor state
        uses: actions/cache/restore@v4
        with:
          path: .monitor-state
          key: monitor-state-${{ github.run_id }}
          restore-keys: |
            monitor-state-

      - name: Run watchdog
        run: npm run monitor
        env:
          SC_TEAM_ID: ${{ secrets.SC_TEAM_ID }}
          SC_PASSWORD: ${{ secrets.SC_PASSWORD }}
          SC_INSTITUTION: ${{ secrets.SC_INSTITUTION }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}

      - name: Save monitor state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .monitor-state
          key: monitor-state-${{ github.run_id }}

      - name: Upload monitor output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-output
          path: .monitor-state
          if-no-files-found: ignore
