name: 15-Minute Warning Email

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:
    inputs:
      chain:
        description: "Continue 15-minute self-dispatch loop"
        required: false
        default: "true"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/warning.yml"
      - "src/monitor.js"
      - "monitor_config.json"
      - "package.json"
      - "package-lock.json"

permissions:
  contents: read
  actions: write

concurrency:
  group: supply-chain-warning
  cancel-in-progress: true

jobs:
  warning-email:
    if: github.event_name != 'push' || contains(github.event.head_commit.message, '[warning-now]')
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Send 15-minute warning email
        run: npm run warning-email
        env:
          SC_TEAM_ID: ${{ secrets.SC_TEAM_ID }}
          SC_PASSWORD: ${{ secrets.SC_PASSWORD }}
          SC_INSTITUTION: ${{ secrets.SC_INSTITUTION }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}

      - name: Queue next 15-minute warning run
        if: success() && (github.event_name != 'workflow_dispatch' || github.event.inputs.chain != 'false')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 900
          gh workflow run warning.yml --ref main -f chain=true
