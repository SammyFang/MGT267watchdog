name: Supply Chain Heartbeat

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - watchdog-heartbeat
  push:
    branches:
      - main

permissions:
  actions: write
  contents: write

concurrency:
  group: supply-chain-heartbeat
  cancel-in-progress: false

jobs:
  heartbeat:
    if: github.event_name != 'push' || contains(github.event.head_commit.message, '[heartbeat-now]')
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore monitor state
        uses: actions/cache/restore@v4
        with:
          path: .monitor-state
          key: heartbeat-state-${{ github.run_id }}
          restore-keys: |
            heartbeat-state-
            monitor-state-

      - name: Check warning rules
        run: npm run warning-email
        env:
          SC_TEAM_ID: ${{ secrets.SC_TEAM_ID }}
          SC_PASSWORD: ${{ secrets.SC_PASSWORD }}
          SC_INSTITUTION: ${{ secrets.SC_INSTITUTION }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Run hourly report throttle
        run: npm run monitor
        env:
          SC_TEAM_ID: ${{ secrets.SC_TEAM_ID }}
          SC_PASSWORD: ${{ secrets.SC_PASSWORD }}
          SC_INSTITUTION: ${{ secrets.SC_INSTITUTION }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Save heartbeat state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .monitor-state
          key: heartbeat-state-${{ github.run_id }}

      - name: Upload heartbeat output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heartbeat-output
          path: .monitor-state
          if-no-files-found: ignore
          include-hidden-files: true

      - name: Wait for next check
        if: success()
        run: sleep 900

      - name: Dispatch next heartbeat
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/dispatches" \
            -d '{"event_type":"watchdog-heartbeat"}'
