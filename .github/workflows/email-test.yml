name: Email Smoke Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/email-test.yml"
      - "src/monitor.js"
      - "package.json"
      - "package-lock.json"
      - "monitor_config.json"

permissions:
  contents: read

jobs:
  send-test-emails:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[email-test]')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Send test emails
        run: npm run test-email
        env:
          SC_TEAM_ID: ${{ secrets.SC_TEAM_ID }}
          SC_PASSWORD: ${{ secrets.SC_PASSWORD }}
          SC_INSTITUTION: ${{ secrets.SC_INSTITUTION }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
